<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Pine Valley Investments</title>
  <meta name="robots" content="noindex, follow" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #03213d; --gold: #c9a96e; --gray: #babab9; --white: #ffffff; }
    body { background: var(--navy); color: var(--white); font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .logo { margin-bottom: 64px; }
    .logo img { height: 40px; width: auto; }
    .code { font-family: 'Montserrat', Arial, sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 14px; }
    .code::before, .code::after { content: ''; display: block; width: 28px; height: 1px; background: var(--gold); }
    h1 { font-size: clamp(36px, 6vw, 72px); font-weight: 300; line-height: 1.1; margin-bottom: 20px; }
    h1 em { font-style: italic; color: var(--gold); }
    p { font-size: 17px; font-weight: 300; line-height: 1.8; color: var(--gray); max-width: 460px; margin-bottom: 48px; }
    .actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn-gold { font-family: 'Montserrat', Arial, sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--navy); background: var(--gold); padding: 15px 38px; text-decoration: none; display: inline-block; transition: opacity 0.2s; }
    .btn-gold:hover { opacity: 0.88; }
    .btn-outline { font-family: 'Montserrat', Arial, sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white); border: 1px solid rgba(255,255,255,0.3); padding: 15px 38px; text-decoration: none; display: inline-block; transition: border-color 0.2s; }
    .btn-outline:hover { border-color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="logo">
    <a href="/"><img src="/pviwhite.png" alt="Pine Valley Investments" /></a>
  </div>
  <div class="code">404</div>
  <h1>Page <em>Not Found</em></h1>
  <p>The page you're looking for doesn't exist or has been moved. Let us help you find what you need.</p>
  <div class="actions">
    <a href="/" class="btn-gold">Go to Homepage</a>
    <a href="/contact.html" class="btn-outline">Contact Us</a>
  </div>
</body>
</html>
