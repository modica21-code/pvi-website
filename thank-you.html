  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--navy:#03213d;--gold:#c9a96e;--blue:#294d6b;--cream:#f0e6d3;--white:#ffffff;--gray:#babab9;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Montserrat',sans-serif}html,body{height:100%}body{background:var(--navy);color:var(--white);font-family:var(--serif);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(186,186,185,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(186,186,185,0.04) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(ellipse 90% 80% at 50% 50%,black 20%,transparent 100%);pointer-events:none;z-index:0}.wrap{position:relative;z-index:1;max-width:580px;width:100%}.logo-wrap{margin-bottom:48px}.logo-wrap img{height:52px;width:auto}.check-circle{width:80px;height:80px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 36px;animation:fadeIn 0.6s ease forwards}.check-circle svg{width:36px;height:36px}@keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}.label{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:14px}.label::before,.label::after{content:'';display:block;width:28px;height:1px;background:var(--gold)}h1{font-family:var(--serif);font-size:clamp(36px,6vw,54px);font-weight:300;line-height:1.15;color:var(--white);margin-bottom:20px}h1 em{font-style:italic;color:var(--gold)}.body-text{font-family:var(--serif);font-size:18px;font-weight:300;line-height:1.7;color:var(--cream);margin-bottom:48px}.btn-gold{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--navy);background:var(--gold);padding:15px 38px;text-decoration:none;display:inline-block;transition:opacity 0.2s;margin-right:12px;margin-bottom:12px}.btn-gold:hover{opacity:0.88}.btn-outline{font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--white);border:1px solid rgba(255,255,255,0.3);padding:15px 38px;text-decoration:none;display:inline-block;transition:border-color 0.2s,color 0.2s;margin-bottom:12px;white-space:nowrap}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}.divider{width:48px;height:1px;background:rgba(201,169,110,0.3);margin:48px auto}.footer-note{font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:0.1em;color:var(--gray)}.footer-note a{color:var(--gold);text-decoration:none}.footer-note a:hover{text-decoration:underline}@media (max-width:480px){.btn-gold,.btn-outline{display:block;margin-right:0;text-align:center}}</style>
</head>

    </div>

    <p class="footer-note">
      Questions? Call us at <a href="tel:8563348260">856-334-8260</a>
    </p>

  </div>
</body>
